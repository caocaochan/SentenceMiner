name: Release Latest Zip

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-latest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Package end-user files
        run: node scripts/package-release.mjs

      - name: Mark Unix launcher executable
        run: chmod +x dist/SentenceMiner/start-helper.sh

      - name: Build latest zip
        run: |
          cd dist
          zip -r ../SentenceMiner-latest.zip SentenceMiner

      - name: Update moving latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin refs/tags/latest --force

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(cat <<EOF
          Automatic latest package from commit ${GITHUB_SHA}.

          Download:
          https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/SentenceMiner-latest.zip
          EOF
          )

          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest SentenceMiner-latest.zip --clobber
            gh release edit latest --title "Latest" --notes "$NOTES" --latest
          else
            gh release create latest SentenceMiner-latest.zip --title "Latest" --notes "$NOTES" --latest
          fi

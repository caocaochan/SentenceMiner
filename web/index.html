<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentenceMiner</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/styles.css?v=20260421-ui3">
  </head>
  <body>
    <div class="app-shell">
      <header class="command-bar">
        <div class="brand-lockup">
          <span class="brand-icon" aria-hidden="true">
            <svg class="lucide-icon"><use href="/icons.svg#captions"></use></svg>
          </span>
          <div>
            <p class="eyebrow">SentenceMiner</p>
            <h1>Transcript</h1>
          </div>
        </div>

        <div class="session-strip" aria-label="Session status">
          <span id="connection-pill" class="status-pill status-pill-muted">Connecting</span>
          <span id="history-count" class="metric">0 lines</span>
          <span id="history-selection-count" class="metric">0 selected</span>
          <span id="file-name" class="file-chip" tabindex="-1">No file loaded</span>
        </div>

        <div class="command-actions">
          <button id="history-mine-selected" class="button button-primary" type="button" disabled>
            <svg class="lucide-icon" aria-hidden="true"><use href="/icons.svg#pickaxe"></use></svg>
            <span>Mine selected</span>
          </button>
          <button id="history-bookmark-filter" class="button button-secondary button-toggle" type="button" aria-pressed="false" disabled>
            <svg class="lucide-icon" aria-hidden="true"><use href="/icons.svg#bookmark"></use></svg>
            <span>0 bookmarks</span>
          </button>
          <button id="theme-toggle" class="icon-button" type="button" aria-label="Toggle light/dark mode" title="Toggle theme">
            <svg class="lucide-icon icon-sun" aria-hidden="true"><use href="/icons.svg#sun"></use></svg>
            <svg class="lucide-icon icon-moon" aria-hidden="true"><use href="/icons.svg#moon"></use></svg>
          </button>
          <button id="settings-button" class="icon-button" type="button" aria-haspopup="dialog" aria-controls="settings-modal" aria-label="Open settings" title="Settings">
            <svg class="lucide-icon" aria-hidden="true"><use href="/icons.svg#settings"></use></svg>
          </button>
        </div>

        <p id="transcript-status" class="transcript-status muted"></p>
      </header>

      <main class="transcript-workspace">
        <section class="history-panel" aria-label="Subtitle transcript">
          <div id="history-list" class="history-list"></div>
        </section>
      </main>
    </div>

    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>

    <div id="settings-modal" class="modal-shell" hidden>
      <div id="settings-backdrop" class="modal-backdrop"></div>
      <section
        id="settings-panel"
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settings-title"
        tabindex="-1"
      >
        <div class="modal-header">
          <div>
            <p class="eyebrow">Settings</p>
            <h2 id="settings-title">Configuration</h2>
          </div>
          <button id="settings-close" class="icon-button icon-button-subtle" type="button" aria-label="Close settings" title="Close">
            <svg class="lucide-icon" aria-hidden="true"><use href="/icons.svg#x"></use></svg>
          </button>
        </div>

        <form id="settings-form" class="settings-form">
          <div class="settings-tabs" role="tablist" aria-label="Settings sections">
            <button class="settings-tab" id="settings-tab-anki" data-settings-tab="anki" type="button" role="tab" aria-controls="settings-panel-anki" aria-selected="true" onclick="window.setSettingsTab?.('anki')">
              <svg class="lucide-icon" aria-hidden="true"><use href="/icons.svg#database"></use></svg>
              <span>Anki</span>
            </button>
            <button class="settings-tab" id="settings-tab-fields" data-settings-tab="fields" type="button" role="tab" aria-controls="settings-panel-fields" aria-selected="false" onclick="window.setSettingsTab?.('fields')">
              <svg class="lucide-icon" aria-hidden="true"><use href="/icons.svg#list-checks"></use></svg>
              <span>Fields</span>
            </button>
            <button class="settings-tab" id="settings-tab-capture" data-settings-tab="capture" type="button" role="tab" aria-controls="settings-panel-capture" aria-selected="false" onclick="window.setSettingsTab?.('capture')">
              <svg class="lucide-icon" aria-hidden="true"><use href="/icons.svg#audio-lines"></use></svg>
              <span>Capture</span>
            </button>
            <button class="settings-tab" id="settings-tab-appearance" data-settings-tab="appearance" type="button" role="tab" aria-controls="settings-panel-appearance" aria-selected="false" onclick="window.setSettingsTab?.('appearance')">
              <svg class="lucide-icon" aria-hidden="true"><use href="/icons.svg#type"></use></svg>
              <span>Appearance</span>
            </button>
          </div>

          <div class="settings-tab-panels">
            <section id="settings-panel-anki" class="settings-section" data-settings-panel="anki" role="tabpanel" aria-labelledby="settings-tab-anki">
              <div class="section-heading">
                <h3>Anki Target</h3>
              </div>
              <div class="settings-grid">
                <label class="field">
                  <span>Deck</span>
                  <select name="anki.deck" id="settings-anki-deck"></select>
                </label>
                <label class="field">
                  <span>Note type</span>
                  <select name="anki.noteType" id="settings-anki-note-type"></select>
                </label>
                <label class="field field-full">
                  <span>Extra query</span>
                  <input type="text" name="anki.extraQuery" id="settings-anki-extra-query" autocomplete="off">
                </label>
                <label class="field field-full">
                  <span>Filename template</span>
                  <input type="text" name="anki.filenameTemplate" id="settings-anki-filename-template" autocomplete="off">
                </label>
              </div>
            </section>

            <section id="settings-panel-fields" class="settings-section" data-settings-panel="fields" role="tabpanel" aria-labelledby="settings-tab-fields" hidden>
              <div class="section-heading">
                <h3>Field Mappings</h3>
              </div>
              <div class="settings-grid">
                <label class="switch-field field-full">
                  <input type="checkbox" name="learning.iPlusOneEnabled" id="settings-i-plus-one-enabled">
                  <span class="switch-track" aria-hidden="true"></span>
                  <span>Mark i+1 transcript lines</span>
                </label>
                <label class="field">
                  <span>Subtitle</span>
                  <select name="anki.fields.subtitle" id="settings-field-subtitle"></select>
                </label>
                <label class="field">
                  <span>Known word</span>
                  <select name="learning.knownWordField" id="settings-known-word-field"></select>
                </label>
                <label class="field">
                  <span>Audio</span>
                  <select name="anki.fields.audio" id="settings-field-audio"></select>
                </label>
                <label class="field">
                  <span>Image</span>
                  <select name="anki.fields.image" id="settings-field-image"></select>
                </label>
                <label class="field">
                  <span>Source</span>
                  <select name="anki.fields.source" id="settings-field-source"></select>
                </label>
                <label class="field">
                  <span>Time</span>
                  <select name="anki.fields.time" id="settings-field-time"></select>
                </label>
                <label class="field">
                  <span>Filename</span>
                  <select name="anki.fields.filename" id="settings-field-filename"></select>
                </label>
              </div>
            </section>

            <section id="settings-panel-capture" class="settings-section" data-settings-panel="capture" role="tabpanel" aria-labelledby="settings-tab-capture" hidden>
              <div class="section-heading">
                <h3>Capture</h3>
              </div>
              <div class="settings-grid settings-grid-toggles">
                <label class="switch-field">
                  <input type="checkbox" name="runtime.captureAudio" id="settings-runtime-capture-audio">
                  <span class="switch-track" aria-hidden="true"></span>
                  <span>Capture audio</span>
                </label>
                <label class="switch-field">
                  <input type="checkbox" name="runtime.captureImage" id="settings-runtime-capture-image">
                  <span class="switch-track" aria-hidden="true"></span>
                  <span>Capture image</span>
                </label>
                <label class="switch-field">
                  <input type="checkbox" name="capture.imageIncludeSubtitles" id="settings-capture-image-include-subtitles">
                  <span class="switch-track" aria-hidden="true"></span>
                  <span>Screenshot subtitles</span>
                </label>
              </div>
              <details id="settings-capture-advanced" class="settings-disclosure" open>
                <summary class="settings-disclosure-summary">Advanced capture</summary>
                <div class="settings-grid settings-grid-advanced">
                  <label class="field">
                    <span>Audio pre-padding (ms)</span>
                    <input type="number" name="capture.audioPrePaddingMs" id="settings-capture-audio-pre-padding-ms" min="0" step="1">
                  </label>
                  <label class="field">
                    <span>Audio post-padding (ms)</span>
                    <input type="number" name="capture.audioPostPaddingMs" id="settings-capture-audio-post-padding-ms" min="0" step="1">
                  </label>
                  <label class="field">
                    <span>Audio format</span>
                    <input type="text" name="capture.audioFormat" id="settings-capture-audio-format" autocomplete="off">
                  </label>
                  <label class="field">
                    <span>Audio codec</span>
                    <input type="text" name="capture.audioCodec" id="settings-capture-audio-codec" autocomplete="off">
                  </label>
                  <label class="field">
                    <span>Audio bitrate</span>
                    <input type="text" name="capture.audioBitrate" id="settings-capture-audio-bitrate" autocomplete="off">
                  </label>
                  <label class="field">
                    <span>Image format</span>
                    <input type="text" name="capture.imageFormat" id="settings-capture-image-format" autocomplete="off">
                  </label>
                  <label class="field">
                    <span>Image quality</span>
                    <input type="number" name="capture.imageQuality" id="settings-capture-image-quality" min="0" step="1">
                  </label>
                  <label class="field">
                    <span>Image max width</span>
                    <input type="number" name="capture.imageMaxWidth" id="settings-capture-image-max-width" min="1" step="1">
                  </label>
                  <label class="field">
                    <span>Image max height</span>
                    <input type="number" name="capture.imageMaxHeight" id="settings-capture-image-max-height" min="1" step="1">
                  </label>
                </div>
              </details>
            </section>

            <section id="settings-panel-appearance" class="settings-section" data-settings-panel="appearance" role="tabpanel" aria-labelledby="settings-tab-appearance" hidden>
              <div class="section-heading">
                <h3>Appearance</h3>
              </div>
              <div class="settings-grid">
                <label class="field">
                  <span>Subtitle card font family</span>
                  <select
                    name="appearance.subtitleCardFontFamilySelect"
                    id="settings-appearance-subtitle-card-font-family-select"
                  ></select>
                </label>
                <label class="field">
                  <span>Subtitle card font size (px)</span>
                  <input
                    type="number"
                    name="appearance.subtitleCardFontSizePx"
                    id="settings-appearance-subtitle-card-font-size-px"
                    min="0"
                    step="1"
                    placeholder="Default"
                  >
                </label>
                <label class="field field-full" id="settings-appearance-subtitle-card-font-family-custom-field" hidden>
                  <span>Custom CSS font-family value</span>
                  <input
                    type="text"
                    name="appearance.subtitleCardFontFamily"
                    id="settings-appearance-subtitle-card-font-family-custom"
                    autocomplete="off"
                    placeholder="Noto Sans JP, sans-serif"
                  >
                </label>
              </div>
            </section>
          </div>

          <p id="settings-options-status" class="settings-status muted" aria-live="polite"></p>
          <p id="settings-error" class="settings-status settings-status-error" aria-live="assertive"></p>

          <div class="modal-footer">
            <button id="settings-cancel" class="button button-secondary" type="button">Cancel</button>
            <button id="settings-save" class="button button-primary" type="submit">Save settings</button>
          </div>
        </form>
      </section>
    </div>

    <script type="module" src="/app.js?v=20260421-ui3"></script>
  </body>
</html>

# mpv script options
# SentenceMiner starts disabled on every mpv launch. Use Ctrl+Shift+m to enable it for the current session.
helper_url=http://127.0.0.1:8766
helper_timeout_ms=5000
helper_auto_start=yes
helper_exe_path=
helper_start_timeout_ms=15000
ffmpeg_path=ffmpeg
temp_dir=
capture_audio=yes
capture_image=yes
bind_default_key=no
default_key=Ctrl+m
bind_bookmark_key=yes
bookmark_key=Ctrl+b
bind_toggle_key=yes
toggle_key=Ctrl+Shift+m

# helper server options
server_host=127.0.0.1
server_port=8766
anki_url=http://127.0.0.1:8765
anki_api_key=
anki_deck=中文
anki_note_type=Lapis
anki_extra_query=
anki_field_subtitle=Sentence
anki_field_audio=SentenceAudio
anki_field_image=Picture
anki_field_source=MiscInfo
anki_field_time=
anki_field_filename=
anki_filename_template={basename}-{startMs}-{kind}.{ext}
capture_audio_pre_padding_ms=250
capture_audio_post_padding_ms=250
capture_audio_format=mp3
capture_audio_codec=libmp3lame
capture_audio_bitrate=128k
capture_image_format=jpg
capture_image_quality=2
capture_image_max_width=1600
capture_image_max_height=900
capture_image_include_subtitles=yes
subtitle_card_font_family=
subtitle_card_font_size_px=0
i_plus_one_enabled=yes
i_plus_one_known_word_field=
i_plus_one_tokenizer=jieba
